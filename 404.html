<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Elevora</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            accent: '#06B6D4',
            darkBg: '#090D1A',
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#FCFCFD] dark:bg-darkBg text-slate-800 dark:text-slate-200 flex items-center justify-center min-h-screen p-6">

  <div class="glass-heavy max-w-lg w-full rounded-3xl p-12 text-center border border-white/20 shadow-2xl relative overflow-hidden animate-fade-in-up">
    <!-- Abstract premium circle designs -->
    <div class="absolute -top-12 -left-12 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl"></div>
    <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-cyan-500/10 rounded-full blur-2xl"></div>

    <div class="relative z-10 space-y-6">
      <div class="text-blue-600 dark:text-cyan-400 text-6xl font-extrabold font-accent">404</div>
      <h1 class="text-2xl font-bold font-accent">Lost in Cyberspace?</h1>
      <p class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed max-w-sm mx-auto">
        The page you are looking for has been moved, renamed, or is temporarily offline. Let us guide you back to safety.
      </p>

      <!-- Action buttons -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
        <a href="/" class="w-full sm:w-auto bg-gradient-premium bg-gradient-premium-hover text-white text-xs font-bold px-6 py-4 rounded-xl btn-premium flex items-center justify-center">
          <i class="fas fa-home mr-2"></i> Go to Homepage
        </a>
        <a href="/shop" class="w-full sm:w-auto bg-slate-100 dark:bg-slate-800 hover:bg-blue-600 hover:text-white text-xs font-bold px-6 py-4 rounded-xl transition flex items-center justify-center">
          <i class="fas fa-shopping-bag mr-2"></i> Continue Shopping
        </a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/products-data.js"></script>
  <script src="/js/script.js"></script>
</body>
</html>
